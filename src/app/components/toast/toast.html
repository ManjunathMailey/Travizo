<!-- Bell Icon Button -->
<div class="notif-bell-wrap">
  <button class="notif-bell-btn" (click)="togglePanel()" [class.ringing]="isRinging" aria-label="Notifications" [attr.aria-expanded]="isOpen">
    <svg class="bell-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="notif-badge" *ngIf="unreadCount > 0" aria-label="{{ unreadCount }} unread notifications">{{ unreadCount > 9 ? '9+' : unreadCount }}</span>
  </button>

  <!-- Dropdown Panel -->
  <div class="notif-panel" [class.open]="isOpen" role="dialog" aria-label="Notifications panel">
    <div class="notif-panel-header">
      <h3>Notifications</h3>
      <button class="notif-clear-btn" *ngIf="notifications.length > 0" (click)="clearAll()">Clear all</button>
    </div>

    <div class="notif-panel-body" *ngIf="notifications.length > 0">
      <div
        *ngFor="let notif of notifications"
        class="notif-item"
        [class.notif-unread]="!notif.read"
        [class.notif-success]="notif.type === 'success'"
        [class.notif-error]="notif.type === 'error'"
        [class.notif-warning]="notif.type === 'warning'"
        [class.notif-info]="notif.type === 'info'"
      >
        <span class="notif-item-icon" aria-hidden="true">{{ notif.icon }}</span>
        <div class="notif-item-content">
          <p class="notif-item-message">{{ notif.message }}</p>
          <span class="notif-item-time">{{ timeAgo(notif.timestamp) }}</span>
        </div>
        <span class="notif-unread-dot" *ngIf="!notif.read" aria-hidden="true"></span>
      </div>
    </div>

    <div class="notif-empty" *ngIf="notifications.length === 0">
      <span class="notif-empty-icon" aria-hidden="true">🔔</span>
      <p>No notifications yet</p>
    </div>
  </div>
</div>
