<div class="login-modal-overlay">
  <div class="login-modal">
    <button class="close-btn" (click)="onClose()">&times;</button>
    
    <div class="modal-tabs">
      <button 
        [class.active]="isLogin" 
        (click)="isLogin = true"
        class="tab-btn">
        Login
      </button>
      <button 
        [class.active]="!isLogin" 
        (click)="isLogin = false"
        class="tab-btn">
        Sign Up
      </button>
    </div>

    <form *ngIf="isLogin; else signupForm" (ngSubmit)="onLogin()" class="auth-form">
      <h2>Login to Your Account</h2>
      
      <div class="form-group">
        <label for="login-email">Email</label>
        <input 
          id="login-email" 
          type="email" 
          [(ngModel)]="loginEmail" 
          name="loginEmail"
          required />
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <input 
          id="login-password" 
          type="password" 
          [(ngModel)]="loginPassword" 
          name="loginPassword"
          required />
      </div>

      <div class="error" *ngIf="loginError">
        {{ loginError }}
      </div>

      <button type="submit" class="btn-primary">Login</button>
    </form>

    <ng-template #signupForm>
      <form (ngSubmit)="onSignup()" class="auth-form">
        <h2>Create Your Account</h2>
        
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input 
            id="signup-name" 
            type="text" 
            [(ngModel)]="signupName" 
            name="signupName"
            required />
        </div>

        <div class="form-group">
          <label for="signup-email">Email</label>
          <input 
            id="signup-email" 
            type="email" 
            [(ngModel)]="signupEmail" 
            name="signupEmail"
            required />
        </div>

        <div class="form-group">
          <label for="signup-phone">Phone</label>
          <input 
            id="signup-phone" 
            type="tel" 
            [(ngModel)]="signupPhone" 
            name="signup-phone"
            placeholder="10-digit number"
            required />
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input 
            id="signup-password" 
            type="password" 
            [(ngModel)]="signupPassword" 
            name="signupPassword"
            required />
        </div>

        <button type="submit" class="btn-primary">Sign Up</button>
      </form>
    </ng-template>
  </div>
</div>
