<div class="login-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="login-modal">
    <button class="close-btn" (click)="onClose()" aria-label="Close login modal">×</button>

    <div class="modal-inner">
      <!-- Tabs -->
      <div class="modal-tabs" role="tablist" aria-label="Login or Sign Up">
        <button
          role="tab"
          [class.active]="isLogin"
          [attr.aria-selected]="isLogin"
          (click)="isLogin = true"
          class="tab-btn"
        >Login</button>
        <button
          role="tab"
          [class.active]="!isLogin"
          [attr.aria-selected]="!isLogin"
          (click)="isLogin = false"
          class="tab-btn"
        >Sign Up</button>
      </div>

      <!-- Login Form -->
      <form *ngIf="isLogin; else signupForm" (ngSubmit)="onLogin()" class="auth-form" novalidate>
        <h2 id="modal-title">Welcome Back</h2>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input
            id="login-email"
            type="email"
            [(ngModel)]="loginEmail"
            name="loginEmail"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input
            id="login-password"
            type="password"
            [(ngModel)]="loginPassword"
            name="loginPassword"
            placeholder="Your password"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="error" *ngIf="loginError" role="alert">{{ loginError }}</div>

        <button type="submit" class="btn-primary">Login</button>
      </form>

      <!-- Sign Up Form -->
      <ng-template #signupForm>
        <form (ngSubmit)="onSignup()" class="auth-form" novalidate>
          <h2 id="modal-title">Create Account</h2>

          <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input
              id="signup-name"
              type="text"
              [(ngModel)]="signupName"
              name="signupName"
              placeholder="Ravi Kumar"
              autocomplete="name"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-email">Email Address</label>
            <input
              id="signup-email"
              type="email"
              [(ngModel)]="signupEmail"
              name="signupEmail"
              placeholder="you@example.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-phone">Phone Number</label>
            <input
              id="signup-phone"
              type="tel"
              [(ngModel)]="signupPhone"
              name="signupPhone"
              placeholder="10-digit number"
              autocomplete="tel"
              required
            />
          </div>

          <div class="form-group">
            <label for="signup-password">Password</label>
            <input
              id="signup-password"
              type="password"
              [(ngModel)]="signupPassword"
              name="signupPassword"
              placeholder="Create a strong password"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="btn-primary">Create Account</button>
        </form>
      </ng-template>
    </div>
  </div>
</div>
